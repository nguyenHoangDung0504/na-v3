<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Altplayer</title>
    <link rel="icon" type="image/x-icon" href="/@resources/icons/icon-edited.webp" />

    <link rel="preload" href="/@resources/databases/s1/tracks.csv" type="text/csv" as="fetch" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">

    <script src="/@components/zoomable-container.js" async></script>
    <script type="module" src="/@src/cache.mgr.mjs"></script>
</head>

<body>

    <div id="shell">
        <div id="stage">

            <!-- Background layers (crossfade) -->
            <zoomable-content id="bg-a"></zoomable-content>
            <zoomable-content id="bg-b"></zoomable-content>

            <!-- Gradients -->
            <div class="grad-top"></div>
            <div class="grad-bot"></div>

            <!-- Image navigation -->
            <div class="img-nav" id="img-prev" title="Ảnh trước">&#8249;</div>
            <div class="img-nav" id="img-next" title="Ảnh sau">&#8250;</div>
            <div id="img-dots"></div>

            <!-- Top bar -->
            <div id="top-bar" translate="no">
                <div id="btn-playlist" class="pill" title="Playlist">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                        <rect x="1" y="2.5" width="9" height="1.5" rx=".75" />
                        <rect x="1" y="6.5" width="7" height="1.5" rx=".75" />
                        <rect x="1" y="10.5" width="8" height="1.5" rx=".75" />
                        <polygon points="12,5 15.5,7.5 12,10" />
                    </svg>
                    Playlist
                </div>
                <div style="display:flex;gap:6px">
                    <div id="btn-sub-list" class="pill" title="Danh sách phụ đề">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                            <rect x="1" y="3" width="14" height="1.5" rx=".75" />
                            <rect x="1" y="7" width="14" height="1.5" rx=".75" />
                            <rect x="1" y="11" width="10" height="1.5" rx=".75" />
                        </svg>
                        Subtitle
                    </div>
                </div>
            </div>

            <!-- Floating subtitle -->
            <div id="float-sub">
                <div id="float-sub-text"></div>
            </div>

            <!-- Bottom controls -->
            <div id="controls">
                <div class="track-info">
                    <div id="track-title">—</div>
                    <div id="track-index">0 / 0</div>
                </div>
                <div class="progress-row">
                    <span class="time" id="time-cur">0:00</span>
                    <div id="progress-wrap">
                        <div id="progress-track">
                            <div id="progress-fill">
                                <div id="progress-thumb"></div>
                            </div>
                        </div>
                    </div>
                    <span class="time" id="time-end">0:00</span>
                </div>
                <div class="ctrl-row">
                    <div class="ctrl-center">
                        <div class="cbtn sm" id="btn-back5" title="Lùi 5 giây">
                            <svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M10 3a7 7 0 1 1-7 7h2a5 5 0 1 0 5-5V3z" />
                                <path d="M10.5 1.5L7 4l3.5 2.5V1.5z" />
                                <text x="10" y="12" font-size="5.5" text-anchor="middle" font-family="inherit"
                                    fill="currentColor">5</text>
                            </svg>

                        </div>
                        <div class="cbtn" id="btn-prev" title="Bài trước">
                            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                                <polygon points="2,8 8,2.5 8,13.5" />
                                <polygon points="8,8 14,2.5 14,13.5" />
                            </svg>
                        </div>
                        <div class="cbtn play" id="btn-play" title="Phát / Dừng">
                            <svg id="play-icon" width="17" height="17" viewBox="0 0 16 16" fill="currentColor">
                                <polygon points="4,2 14,8 4,14" />
                            </svg>
                        </div>
                        <div class="cbtn" id="btn-next" title="Bài tiếp">
                            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                                <polygon points="2,2.5 8,8 2,13.5" />
                                <polygon points="8,2.5 14,8 8,13.5" />
                            </svg>
                        </div>
                        <div class="cbtn sm" id="btn-fwd5" title="Tiến 5 giây">
                            <svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M10 3a7 7 0 1 0 7 7h-2a5 5 0 1 1-5-5V3z" />
                                <path d="M9.5 1.5l3.5 2.5-3.5 2.5V1.5z" />
                                <text x="10" y="12" font-size="5.5" text-anchor="middle" font-family="inherit"
                                    fill="currentColor">5</text>
                            </svg>
                        </div>
                    </div>
                    <div class="ctrl-right">
                        <div class="cbtn sm" id="btn-float-sub" title="Phụ đề nổi">
                            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                                <rect x="2" y="9.5" width="12" height="1.5" rx=".75" opacity=".55" />
                                <rect x="2" y="12.5" width="9" height="1.5" rx=".75" opacity=".55" />
                                <rect x="2.5" y="2.5" width="11" height="5.5" rx="1.2" />
                            </svg>
                        </div>

                        <input type="file" id="file-input" accept="image/*,video/*" multiple hidden>

                        <div class="cbtn sm" id="btn-upload" title="Upload media">
                            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                                <path d="M8 1v9M5 4l3-3 3 3" />
                                <rect x="2" y="10" width="12" height="4" rx="1" />
                            </svg>
                        </div>
                        <!-- 
                        <div class="cbtn sm" id="btn-reload" title="Phát lại từ đầu">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
                                <path d="M14 8A6 6 0 1 1 8 2V0L12 3 8 6V4a4 4 0 1 0 4 4h2z" />
                            </svg>
                        </div> -->

                        <div class="cbtn sm" id="btn-rotate" title="Xoay màn hình">
                            <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor"
                                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

                                <g transform="rotate(-60 10 10)">
                                    <rect x="6.5" y="7.5" width="7" height="5" rx="1" transform="rotate(-15 10 10)" />

                                    <path d="M4.5 6.5 A7 7 0 0 1 15.5 6.5" />
                                    <polyline points="14.06,6.06 15.5,6.5 14.74,5.20" />

                                    <path d="M15.5 13.5 A7 7 0 0 1 4.5 13.5" />
                                    <polyline points="5.94,13.94 4.5,13.5 5.26,14.80" />
                                </g>

                            </svg>
                        </div>
                        <div class="cbtn sm" id="btn-fullscreen" title="Toggle Fullscreen">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
                                <path
                                    d="M1 6V1h5v2H3v3H1zm10-5h5v5h-2V3h-3V1zM1 10h2v3h3v2H1v-5zm12 3v-3h2v5h-5v-2h3z" />
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Playlist panel -->
            <div class="side-panel" id="playlist-panel">
                <div class="panel-hdr">
                    <span class="panel-title" id="pl-title">Playlist</span>
                    <button class="close-x" id="btn-close-pl">&#215;</button>
                </div>
                <div id="playlist-list" lang="ja"></div>
            </div>

            <!-- Subtitle panel -->
            <div class="side-panel" id="sub-panel">
                <div class="panel-hdr">
                    <span class="panel-title">Phụ đề</span>
                    <button class="close-x" id="btn-close-sub">&#215;</button>
                </div>
                <div id="sub-list-wrap" translate="no">
                    <div id="sub-list-inner"></div>
                    <div id="no-sub">Không có phụ đề</div>
                </div>
            </div>

            <!-- Dim -->
            <div id="dim"></div>

        </div><!-- #stage -->
    </div><!-- #shell -->

    <audio id="audio" preload="auto" crossorigin="anonymous" referrerpolicy="no-referrer"></audio>
    <script type="module" src="app.new.mjs"></script>
    <script>
        // document.cookie = "googtrans=;path=/;expires=Thu, 01 Jan 1970 00:00:00 UTC;"
        function initTranslate() {
            new google.translate.TranslateElement({
                pageLanguage: 'auto',
                includedLanguages: 'vi,en',
                autoDisplay: false,
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'playlist-list');

            const btn = document.createElement('button')
            btn.onclick = resetTranslate
            btn.textContent = 'Original'
            document.querySelector('.skiptranslate.goog-te-gadget').appendChild(btn)
        }

        function resetTranslate() {
            const iframe = document.querySelector('.VIpgJd-ZVi9od-ORHb-OEVmcd')
            console.log(iframe);
            if (iframe) {
                const btn = iframe.contentWindow.document.querySelectorAll('button')
                btn.forEach(node => node.textContent === 'Show original' && node.click())
            }
        }
    </script>

    <script src="//translate.google.com/translate_a/element.js?cb=initTranslate"></script>
</body>

</html>
